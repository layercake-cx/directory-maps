<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layercake Maps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body style="margin:0;min-height:100vh;background:#f3f4f6;color:#111;font-family:system-ui,sans-serif;">
    <div id="root">Loading…</div>
    <noscript>Enable JavaScript to use this app.</noscript>
    <script>
      // Redirect legacy hash-based URLs (e.g. /#/client/maps/123) to clean paths (/client/maps/123).
      // The hash never reaches the server so this must run client-side before React mounts.
      (function () {
        var hash = window.location.hash;
        if (hash.startsWith("#/")) {
          var path = hash.slice(1); // "#/foo?bar=1" → "/foo?bar=1"
          window.location.replace(
            window.location.origin + path
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
